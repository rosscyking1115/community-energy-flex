# DuckDB-first: the same models run on Snowflake later by adding a target.
# Point dbt at this file with:  set DBT_PROFILES_DIR=%CD%\dbt_energy  (Windows)
dbt_energy:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: energy.duckdb
      threads: 4
    # Same models, second target. Switch with:  dbt build --target snowflake
    snowflake:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'TRANSFORMER') }}"
      database: ENERGY_FLEXIBILITY_OS
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'COMPUTE_WH') }}"
      schema: MARTS
      threads: 4
