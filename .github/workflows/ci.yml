name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev)
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: python -m pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  dbt-fixture:
    runs-on: ubuntu-latest
    env:
      CEF_FIXTURE_MODE: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install fixture warehouse dependencies
        run: python -m pip install -e ".[warehouse,api,dev]"

      - name: Regenerate deterministic reporting fixture seed
        run: python scripts/generate_powerbi_seed.py

      - name: Build and test DuckDB reporting contract
        run: dbt build --full-refresh --project-dir dbt_energy --profiles-dir dbt_energy

      - name: Export coherent Power BI star tables
        run: python scripts/export_powerbi_star_tables.py

      - name: Generate dbt documentation
        run: dbt docs generate --project-dir dbt_energy --profiles-dir dbt_energy

      - name: Reconcile fixture consumers
        run: python -m pytest tests/test_reporting_fixture.py api/tests/test_reporting_contract.py
